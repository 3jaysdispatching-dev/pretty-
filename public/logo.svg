<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D4EDD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF006E;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer hexagon -->
  <polygon points="100,20 170,55 170,145 100,180 30,145 30,55" 
           fill="url(#logoGradient)" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Middle hexagon -->
  <polygon points="100,40 155,70 155,130 100,160 45,130 45,70" 
           fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- Inner hexagon with glow -->
  <polygon points="100,60 140,85 140,115 100,140 60,115 60,85" 
           fill="url(#logoGradient)" filter="url(#glow)"/>
  
  <!-- Center dot (AI core) -->
  <circle cx="100" cy="100" r="8" fill="#00D9FF" filter="url(#glow)"/>
  
  <!-- Three connection lines (representing "THREE") -->
  <line x1="100" y1="60" x2="100" y2="92" stroke="#00D9FF" stroke-width="1.5" opacity="0.8"/>
  <line x1="85" y1="75" x2="100" y2="92" stroke="#00D9FF" stroke-width="1.5" opacity="0.8"/>
  <line x1="115" y1="75" x2="100" y2="92" stroke="#00D9FF" stroke-width="1.5" opacity="0.8"/>
</svg>
