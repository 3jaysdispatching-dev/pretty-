version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dispatchos-db
    environment:
      POSTGRES_USER: dispatchos
      POSTGRES_PASSWORD: dispatchos123
      POSTGRES_DB: dispatchos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatchos"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dispatchos-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://dispatchos:dispatchos123@postgres:5432/dispatchos
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./public:/app/public
    restart: unless-stopped

volumes:
  postgres_data:
