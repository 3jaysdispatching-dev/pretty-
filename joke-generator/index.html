<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <header>
                <h1>😂 Joke Generator</h1>
                <p class="subtitle">Get a laugh with a random joke</p>
            </header>

            <div class="joke-display">
                <div id="jokeContainer" class="joke-content">
                    <p id="jokeText" class="joke-text">Click "Get Joke" to start laughing!</p>
                    <p id="jokeType" class="joke-type"></p>
                </div>
            </div>

            <div class="button-group">
                <button id="getJokeBtn" class="btn btn-primary" aria-label="Get a random joke">
                    Get Joke
                </button>
                <button id="shareBtn" class="btn btn-secondary" aria-label="Share this joke" disabled>
                    Share
                </button>
                <button id="copyBtn" class="btn btn-secondary" aria-label="Copy joke to clipboard" disabled>
                    Copy
                </button>
            </div>

            <div class="options">
                <label for="jokeType">Joke Type:</label>
                <select id="jokeTypeSelect" class="select-input">
                    <option value="any">Any</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                </select>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>

            <div id="error" class="error" style="display: none;">
                <p id="errorText"></p>
            </div>

            <div class="stats">
                <p>Jokes loaded: <span id="jokeCount">0</span></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
