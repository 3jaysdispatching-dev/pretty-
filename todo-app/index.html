<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My To-Do List</h1>
            <p class="subtitle">Stay organized and get things done</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                class="todo-input" 
                placeholder="Add a new task..."
                aria-label="New task input"
            >
            <button id="addBtn" class="add-btn" aria-label="Add task">Add Task</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="stats">
            <span id="taskCount">0 tasks</span>
            <button id="clearCompleted" class="clear-btn">Clear Completed</button>
        </div>

        <ul id="todoList" class="todo-list" aria-label="To-do list">
            <!-- Tasks will be dynamically added here -->
        </ul>

        <div id="emptyState" class="empty-state">
            <p>No tasks yet. Add one to get started! ✨</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
